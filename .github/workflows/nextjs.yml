# Modified sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - src/**
      - package.json
      - public/**

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Daily refresh of the contribution snapshot. Commits the new snapshot back to
  # main, which also counts as repo activity so the schedule isn't auto-disabled
  # (GitHub disables scheduled workflows after ~60 days of inactivity).
  schedule:
    - cron: "0 8 * * *"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
# contents:write lets the scheduled run commit the refreshed snapshot.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # You may remove this line if you want to manage the configuration yourself.
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      # Refresh the GitHub contribution snapshot baked into the static export.
      # Non-fatal: a transient API failure falls back to the committed snapshot.
      - name: Refresh contribution snapshot
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/fetch-contributions.mjs
      # On the daily run, persist the refreshed snapshot back to main. The
      # `updated` date changes every day, so there is always a diff to commit —
      # which keeps the schedule alive. Commits made with GITHUB_TOKEN do not
      # re-trigger workflows, so this never loops.
      - name: Commit refreshed snapshot
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/data/contributions.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: refresh contribution snapshot"
            git push
          fi
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
      # - name: Static HTML export with Next.js
      #   run: ${{ steps.detect-package-manager.outputs.runner }} next export
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
